<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBN-Grid — Paint by Number Grid Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PBN-Grid</h1>
    <p>Upload an image and generate a printable paint-by-number grid.</p>

    <div class="tabs">
        <button class="tab-btn active" data-tab="choose">Choose a Puzzle</button>
        <button class="tab-btn" data-tab="create">Create Your Own</button>
    </div>

    <div id="tab-choose" class="tab-content active">
        <input type="text" id="puzzle-filter" placeholder="Filter by number or title...">
        <label class="show-titles-label"><input type="checkbox" id="show-titles"> Show titles</label>
        <div id="puzzle-list"></div>
        <div id="puzzle-empty"></div>
    </div>

    <div id="tab-create" class="tab-content">
        <section id="upload">
            <label for="image-input">Choose an image:</label>
            <input type="file" id="image-input" accept="image/*">
            <img id="preview" alt="Preview" style="display: none">
        </section>

        <section id="options">
            <div>
                <label for="color-count">Color count:</label>
                <input type="number" id="color-count" min="2" max="30" value="10">
            </div>
            <div>
                <label for="constrain-by">Constrain by:</label>
                <select id="constrain-by">
                    <option value="width">Width</option>
                    <option value="height">Height</option>
                </select>
            </div>
            <div>
                <label for="cell-count">Cell count:</label>
                <input type="number" id="cell-count" min="5" max="100" value="30">
            </div>
        </section>

        <div id="warning" style="display: none;"></div>

        <button id="generate-btn" disabled>Generate</button>
    </div>

    <section id="result" style="display: none;">
        <canvas id="result-canvas"></canvas>
        <div id="result-actions">
            <button id="download-btn">Download PNG</button>
            <button id="print-btn">Print</button>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
